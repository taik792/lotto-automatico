<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Evolution PRO MAX</title>

<style>
body {
    background: #020617;
    color: #e2e8f0;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: #22c55e;
}

.box-top {
    border: 1px solid #22c55e;
    border-radius: 10px;
    padding: 15px;
    margin: 20px auto;
    width: 90%;
    max-width: 500px;
    background: #020617;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 15px;
    padding: 10px;
}

.card {
    background: #0f172a;
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 0 10px #000;
}

.ruota {
    color: #22c55e;
    font-weight: bold;
    margin-bottom: 5px;
}

.label {
    color: #94a3b8;
    font-size: 12px;
}

.numero {
    color: #38bdf8;
}

.ambo {
    color: #22c55e;
    font-weight: bold;
}

.ciclo {
    color: #f59e0b;
}

.sat {
    color: #38bdf8;
}

.indice {
    color: #f43f5e;
}
</style>
</head>

<body>

<h1>🔥 Lotto Evolution PRO MAX</h1>

<div class="box-top" id="top"></div>

<div class="container" id="grid"></div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

    // 🔥 TOP GIOCATE
    let topHtml = "<h3>🔥 Migliori Giocate</h3>";

    data.giocate_top.forEach(g => {
        topHtml += `<div>${g.ruota} → ${g.ambo}</div>`;
    });

    document.getElementById("top").innerHTML = topHtml;

    // 🔥 RUOTE
    let grid = "";

    data.ruote.forEach(r => {

        grid += `
        <div class="card">

            <div class="ruota">${r.ruota}</div>

            <div class="label">Ultima</div>
            <div>${r.ultima ? r.ultima.join(" - ") : "-"}</div>

            <div class="label">Caldi</div>
            <div class="numero">
                ${r.numeri_caldi ? r.numeri_caldi.join(" - ") : "-"}
            </div>

            <div class="label">Ambo</div>
            <div class="ambo">${r.ambo_forte || "-"}</div>

            <div class="label">Ciclo</div>
            <div class="ciclo">${r.ciclometria || "-"}</div>

            <div class="label">Indice</div>
            <div class="indice">${r.indice || "-"}</div>

            <div class="label">Saturazione</div>
            <div class="sat">${r.saturazione || "-"}</div>

        </div>
        `;
    });

    document.getElementById("grid").innerHTML = grid;

})
.catch(err => {
    document.body.innerHTML += "<p>Errore caricamento dati</p>";
});
</script>

</body>
</html>
