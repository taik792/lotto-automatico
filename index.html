<script>
fetch("risultati.json")
  .then(res => res.json())
  .then(data => {

    const topPick = data.top_pick || [];

    const ruote = Object.keys(data)
      .filter(k => k !== "top_pick")
      .map(k => data[k]);

    // =========================
    // TOP PICK
    // =========================
    const topBox = document.querySelector(".top-pick");

    if (topBox) {
      topBox.innerHTML = `
        <div class="top-title">🔥 Migliori Giocate del Giorno</div>
        ${topPick.map(t => `
          <div>${t.ruota} → ${t.ambo.join("-")}</div>
        `).join("")}
      `;
    }

    // =========================
    // CONTAINER ORIGINALE
    // =========================
    const container = document.querySelector(".container");

    if (!container) return;

    container.innerHTML = "";

    // =========================
    // CARDS BELLE
    // =========================
    ruote.forEach(r => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h2>${r.ruota}</h2>

        <div class="info">
          <div>Ultima estrazione</div>
          <div>${r.ultima.join(" - ")}</div>
        </div>

        <div class="info">
          <div>Numeri caldi</div>
          <div>${r.caldi.join(" - ")}</div>
        </div>

        <div class="info">
          <div>Ambo forte</div>
          <div class="highlight">${r.ambo.join(" - ")}</div>
        </div>

        <div class="info">
          <div>Ciclometria</div>
          <div>${r.ciclo.join(" - ")}</div>
        </div>

        <div class="info">
          <div>Indice</div>
          <div class="highlight-red">${r.indice.join(" - ")}</div>
        </div>

        <div class="info">
          <div>Saturazione</div>
          <div>${r.saturazione}</div>
        </div>
      `;

      container.appendChild(card);
    });

    // =========================
    // NASCONDI LOADING
    // =========================
    const loading = document.querySelector(".loading");
    if (loading) loading.style.display = "none";

  })
  .catch(err => {
    console.error(err);
  });
</script>
