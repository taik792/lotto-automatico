<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Lotto Evolution PRO MAX</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:30px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:40px;
}

.card{
background:#1e1e1e;
border:2px solid orange;
border-radius:10px;
padding:20px;
margin:10px;
width:230px;
}

.card h2{
color:#00ff9c;
}

table{
margin:auto;
margin-top:30px;
}

</style>

</head>

<body>

<h1>Lotto Evolution PRO MAX</h1>

<div class="container" id="risultati"></div>

<h2 style="margin-top:60px">Test Settimanale</h2>

<table border="1">

<tr>
<th>Estr.</th>
<th>Ruota</th>
<th>Ambo</th>
<th>Usciti</th>
<th>Risultato</th>
</tr>

<tr>
<td>Martedi</td>
<td></td>
<td></td>
<td></td>
<td></td>
</tr>

<tr>
<td>Giovedi</td>
<td></td>
<td></td>
<td></td>
<td></td>
</tr>

<tr>
<td>Sabato</td>
<td></td>
<td></td>
<td></td>
<td></td>
</tr>

</table>

<script>

fetch("risultati.json")
.then(response => response.json())
.then(data => {

const container = document.getElementById("risultati");

data.ruote.forEach(r => {

const card = document.createElement("div");

card.className = "card";

card.innerHTML = `
<h2>${r.ruota}</h2>

<p><b>Ultima estrazione</b><br>
${r.ultima.join(" - ")}</p>

<p><b>Numeri caldi</b><br>
${r.numeri_caldi.join(" , ")}</p>

<p><b>Ambo forte</b><br>
${r.ambo_forte}</p>

<p><b>Ambi ciclometrici</b><br>
${r.ciclometria.join(" | ")}</p>

<p><b>Saturazione ruota</b><br>
${r.saturazione}</p>
`;

container.appendChild(card);

});

});

</script>

</body>
</html>
