<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Evolution PRO MAX</title>

<style>
body {
  background: #020617;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  color: #22c55e;
}

.box-top {
  border: 1px solid #22c55e;
  padding: 15px;
  margin: 20px;
  border-radius: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  padding: 10px;
}

.card {
  background: #0f172a;
  border-radius: 12px;
  padding: 10px;
}

.ruota {
  color: #22c55e;
  font-weight: bold;
}

.label {
  color: #94a3b8;
  font-size: 12px;
}

.ambo {
  color: #22c55e;
}

.ciclo {
  color: orange;
}

.indice {
  color: #f43f5e;
}

.sat {
  color: #38bdf8;
}
</style>
</head>

<body>

<h1>🔥 Lotto Evolution PRO MAX</h1>

<div class="box-top" id="top"></div>

<div class="grid" id="grid"></div>

<script>
fetch("risultati.json")
  .then(r => r.json())
  .then(data => {

    const ruote = Object.values(data);

    // TOP 3
    const top = ruote.slice(0, 3).map(r =>
      `${r.ruota} → ${r.ambo.join("-")}`
    ).join("<br>");

    document.getElementById("top").innerHTML =
      "🔥 Migliori Giocate<br><br>" + top;

    // CARDS
    document.getElementById("grid").innerHTML = ruote.map(r => `
      <div class="card">
        <div class="ruota">${r.ruota}</div>

        <div class="label">Ultima</div>
        <div>${r.ultima.join(" - ")}</div>

        <div class="label">Caldi</div>
        <div>${r.caldi.join(" - ")}</div>

        <div class="label">Ambo</div>
        <div class="ambo">${r.ambo.join("-")}</div>

        <div class="label">Ciclo</div>
        <div class="ciclo">${r.ciclo.join(" | ")}</div>

        <div class="label">Indice</div>
        <div class="indice">${r.indice.join(" | ")}</div>

        <div class="label">Saturazione</div>
        <div class="sat">${r.saturazione}</div>
      </div>
    `).join("");

  })
  .catch(err => {
    document.body.innerHTML = "Errore caricamento dati";
    console.error(err);
  });
</script>

</body>
</html>
