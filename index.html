<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Elite Pro</title>

<style>
body {
    background: #020617;
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 { color:#00ff99; }

.box {
    border:2px solid #00ff99;
    border-radius:12px;
    padding:15px;
    margin:20px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap:15px;
    padding:20px;
}

.card {
    border:2px solid #00ff99;
    border-radius:10px;
    padding:10px;
}

.green { color:#00ff99; }
.red { color:#ff4d4d; }
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>

<div id="top" class="box"></div>
<div id="ruote" class="grid"></div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

    const topBox = document.getElementById("top");
    const container = document.getElementById("ruote");

    let tutte = Object.values(data);

    // 🔥 ORDINA
    tutte.sort((a, b) => b.score - a.score);

    // 🔝 TOP
    let top = tutte.slice(0, 3);

    topBox.innerHTML = `
        <h2>🔥 TOP GIOCATE</h2>
        ${top.map(r => `${r.ruota} → ${r.ambo[0]} - ${r.ambo[1]}`).join("<br>")}
    `;

    // 🔥 MOSTRA TUTTE (senza errori)
    container.innerHTML = "";

    tutte.forEach(r => {
        container.innerHTML += `
            <div class="card">
                <h3>${r.ruota}</h3>
                <p class="green">Ambo: ${r.ambo[0]} - ${r.ambo[1]}</p>
                <p class="red">Score: ${r.score}</p>
            </div>
        `;
    });

});
</script>

</body>
</html>
