<script>
fetch("risultati.json")
  .then(res => res.json())
  .then(data => {

    console.log("DATI:", data);

    if (!data) return;

    const topPick = data.top_pick || [];

    const ruote = Object.keys(data)
      .filter(k => k !== "top_pick" && typeof data[k] === "object")
      .map(k => data[k]);

    // =========================
    // TOP PICK
    // =========================
    const topBox = document.querySelector(".top-pick");

    if (topBox && topPick.length) {
      let html = "<h3>🔥 Migliori Giocate</h3>";

      topPick.forEach(t => {
        if (t.ruota && t.ambo) {
          html += `<div>${t.ruota} → ${t.ambo.join("-")}</div>`;
        }
      });

      topBox.innerHTML = html;
    }

    // =========================
    // CONTAINER SICURO
    // =========================
    let container = document.querySelector(".container");

    if (!container) {
      container = document.createElement("div");
      document.body.appendChild(container);
    }

    container.innerHTML = "";

    // =========================
    // CARDS
    // =========================
    ruote.forEach(r => {

      if (!r || !r.ruota) return;

      const card = document.createElement("div");
      card.className = "card";

      try {
        card.innerHTML = `
          <h2>${r.ruota}</h2>

          <p>Ultima estrazione<br>
          ${(r.ultima || []).join(" - ")}</p>

          <p>Numeri caldi<br>
          ${(r.caldi || []).join(" - ")}</p>

          <p>Ambo forte<br>
          ${(r.ambo || []).join(" - ")}</p>

          <p>Ciclometria<br>
          ${(r.ciclo || []).join(" - ")}</p>

          <p>Indice<br>
          ${(r.indice || []).join(" - ")}</p>

          <p>Saturazione<br>
          ${r.saturazione ?? ""}</p>
        `;
      } catch (e) {
        console.log("Errore card:", e);
      }

      container.appendChild(card);
    });

    // =========================
    // STOP LOADING
    // =========================
    const loading = document.querySelector(".loading");
    if (loading) loading.style.display = "none";

  })
  .catch(err => {
    console.error("ERRORE JSON:", err);
    document.body.innerHTML = "<h2 style='color:white'>Errore caricamento dati</h2>";
  });
</script>
