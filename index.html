<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Evolution PRO MAX</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  color: #22c55e;
  font-weight: bold;
}

/* BOX TOP */
.top {
  border: 1px solid #22c55e;
  margin: 15px;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

/* GRID NUOVO (QUI STA LA MAGIA) */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* CARD */
.card {
  background: #020617;
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 0 15px rgba(0,255,150,0.1);
  text-align: center;
}

.card h2 {
  color: #22c55e;
}

/* LABEL */
.label {
  color: #9ca3af;
  font-size: 13px;
}

/* COLORI */
.green { color: #22c55e; }
.orange { color: orange; }
.red { color: #f43f5e; }
.blue { color: #38bdf8; }
</style>
</head>

<body>

<div class="header">🔥 Lotto Evolution PRO MAX</div>

<div class="top" id="top"></div>

<div class="grid" id="grid"></div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

  const grid = document.getElementById("grid");
  const top = document.getElementById("top");

  let migliori = [];

  Object.values(data).forEach(r => {

    // TOP PICK (sceglie i migliori automaticamente)
    if (r.indice && r.indice[0] > 4) {
      migliori.push(`${r.ruota} → ${r.ambo.join("-")}`);
    }

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h2>${r.ruota}</h2>

      <div class="label">Ultima</div>
      <div>${r.ultima.join(" - ")}</div>

      <div class="label">Caldi</div>
      <div>${r.caldi.join(" - ")}</div>

      <div class="label">Ambo</div>
      <div class="green">${r.ambo.join("-")}</div>

      <div class="label">Ciclo</div>
      <div class="orange">${r.ciclo.join(" | ")}</div>

      <div class="label">Indice</div>
      <div class="red">${r.indice.join(" | ")}</div>

      <div class="label">Saturazione</div>
      <div class="blue">${r.saturazione}</div>
    `;

    grid.appendChild(card);
  });

  top.innerHTML = `
    🔥 Migliori Giocate<br>
    ${migliori.slice(0,3).join("<br>")}
  `;

})
.catch(() => {
  document.getElementById("top").innerHTML = "Errore caricamento dati";
});
</script>

</body>
</html>
