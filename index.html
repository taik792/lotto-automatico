<script>
fetch("risultati.json")
  .then(res => res.json())
  .then(data => {

    const topPick = data.top_pick || [];

    const ruote = Object.keys(data)
      .filter(k => k !== "top_pick")
      .map(k => data[k]);

    // =========================
    // TOP PICK (BOX VERDE)
    // =========================
    const topBox = document.querySelector(".top-pick");

    if (topBox) {
      topBox.innerHTML = `
        <h3>🔥 Migliori Giocate</h3>
        ${topPick.map(t => `${t.ruota} → ${t.ambo.join("-")}`).join("<br>")}
      `;
    }

    // =========================
    // CARDS
    // =========================
    const container = document.querySelector(".container");

    if (!container) return;

    container.innerHTML = "";

    ruote.forEach(r => {
      container.innerHTML += `
        <div class="card">
          <h2>${r.ruota}</h2>

          <p>Ultima estrazione<br>
          ${r.ultima.join(" - ")}</p>

          <p>Numeri caldi<br>
          ${r.caldi.join(" - ")}</p>

          <p>Ambo forte<br>
          <b>${r.ambo.join(" - ")}</b></p>

          <p>Ciclometria<br>
          ${r.ciclo.join(" - ")}</p>

          <p>Indice<br>
          ${r.indice.join(" - ")}</p>

          <p>Saturazione<br>
          ${r.saturazione}</p>
        </div>
      `;
    });

    // =========================
    // NASCONDI LOADING
    // =========================
    const loading = document.querySelector(".loading");
    if (loading) loading.style.display = "none";

  })
  .catch(err => {
    console.error(err);
  });
</script>
