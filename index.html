<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lotto Evolution PRO MAX</title>

<style>
body {
    background: #0d0d0d;
    color: #00ff99;
    font-family: Arial;
    text-align: center;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    border: 1px solid #00ff99;
    border-radius: 10px;
    margin: 10px;
    padding: 10px;
    width: 180px;
}
</style>
</head>

<body>

<h1>🔥 Lotto Evolution PRO MAX</h1>

<div id="top"></div>

<div class="container" id="ruote-container"></div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

    // 🔥 TOP GIOCATE
    let topHTML = "<h3>🔥 Migliori Giocate del Giorno</h3>";

    data.giocate_top.forEach(t => {
        topHTML += `<p>${t.ruota} → ${t.ambo}</p>`;
    });

    document.getElementById("top").innerHTML = topHTML;

    // 🔥 RUOTE
    const container = document.getElementById("ruote-container");

    data.ruote.forEach(r => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${r.ruota}</h3>
            <p><b>Ultima</b><br>${r.ultima}</p>
            <p><b>Numeri caldi</b><br>${r.numeri_caldi}</p>
            <p><b>Ambo</b><br>${r.ambo_forte}</p>
            <p><b>Ciclometria</b><br>${r.ciclometria}</p>
            <p><b>Saturazione</b><br>${r.saturazione}</p>
        `;

        container.appendChild(div);
    });

});
</script>

</body>
</html>
