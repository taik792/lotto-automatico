<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto ELITE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: white;
  text-align: center;
}

h1 {
  color: #00ff9c;
  margin-top: 20px;
}

.box-top {
  border: 2px solid #00ff9c;
  border-radius: 20px;
  padding: 15px;
  margin: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

.card {
  border: 2px solid #00ff9c;
  border-radius: 20px;
  padding: 15px;
  text-align: left;
}

.titolo {
  color: #00ff9c;
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 10px;
}

.label {
  color: #aaa;
  font-size: 13px;
}

.green {
  color: #00ff9c;
  font-weight: bold;
}

.red {
  color: #ff4d4d;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE</h1>

<div id="top" class="box-top">Caricamento...</div>

<div id="grid" class="grid"></div>

<script>
fetch("risultati.json")
.then(res => {
  if (!res.ok) throw new Error("JSON non trovato");
  return res.json();
})
.then(data => {

  const ordine = [
    "Bari","Cagliari","Firenze","Genova",
    "Milano","Napoli","Palermo","Roma",
    "Torino","Venezia","Nazionale"
  ];

  let valori = Object.values(data);

  // 🔥 FILTRO PROFIT (SOLO SCORE ALTI)
  let forti = valori.filter(r => r.score > 15);

  // 🔥 ORDINE RUOTE
  forti.sort((a,b) =>
    ordine.indexOf(a.ruota) - ordine.indexOf(b.ruota)
  );

  // 🔥 TOP 3 REALI
  let top = [...forti]
    .sort((a,b) => b.score - a.score)
    .slice(0,3);

  document.getElementById("top").innerHTML =
    "<b>🔥 SEGNALI TOP</b><br><br>" +
    top.map(r =>
      `${r.ruota} → ${r.ambo.join(" - ")}`
    ).join("<br>");

  // 🔥 MOSTRA SOLO I MIGLIORI (MAX 3)
  document.getElementById("grid").innerHTML = forti
    .slice(0,3)
    .map(r => `
    <div class="card">
      <div class="titolo">${r.ruota}</div>

      <div class="label">Ultima</div>
      ${r.ultima.join(" - ")}

      <div class="label">Caldi</div>
      ${r.caldi.join(" - ")}

      <div class="label">Ambo</div>
      <span class="green">${r.ambo.join(" - ")}</span>

      <div class="label">Score</div>
      <span class="red">${r.score.toFixed(2)}</span>
    </div>
  `).join("");

})
.catch(err => {
  document.getElementById("top").innerHTML = "Errore caricamento dati";
});
</script>

</body>
</html>
