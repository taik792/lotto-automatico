<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto Evolution PRO MAX</title>

<style>
body {
    background: #0b1220;
    color: #e5e7eb;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
}

h1 {
    color: #22d3ee;
    margin-top: 20px;
}

.box-top {
    border: 1px solid #22d3ee;
    border-radius: 12px;
    padding: 15px;
    margin: 20px;
    background: #0f172a;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 15px;
    padding: 15px;
}

.card {
    background: #0f172a;
    border-radius: 12px;
    padding: 15px;
    border: 1px solid #1f2937;
    box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

.card h3 {
    color: #22c55e;
}

.label {
    color: #9ca3af;
    font-size: 13px;
}

.value {
    font-weight: bold;
    margin-bottom: 6px;
}

.ambo {
    color: #22c55e;
    font-size: 16px;
}

.ciclo {
    color: #f59e0b;
}

.sat {
    color: #38bdf8;
}

</style>
</head>

<body>

<h1>🔥 Lotto Evolution PRO MAX</h1>

<div class="box-top">
    <h3>🔥 Migliori Giocate</h3>
    <div id="top"></div>
</div>

<div class="container" id="contenuto"></div>

<script>

fetch("risultati.json")
.then(res => res.json())
.then(data => {

    // 🔥 TOP GIOCATE
    let topHTML = "";
    if (data.giocate_top) {
        data.giocate_top.forEach(g => {
            topHTML += `<div>${g.ruota} → ${g.ambo}</div>`;
        });
    }
    document.getElementById("top").innerHTML = topHTML;

    // 🔥 RUOTE
    let html = "";

    data.ruote.forEach(r => {

        html += `
        <div class="card">
            <h3>${r.ruota}</h3>

            <div class="label">Ultima</div>
            <div class="value">${(r.ultima || []).join(" - ")}</div>

            <div class="label">Caldi</div>
            <div class="value">${(r.numeri_caldi || []).join(" - ")}</div>

            <div class="label">Ambo</div>
            <div class="ambo">${r.ambo_forte || "-"}</div>

            <div class="label">Ciclo</div>
            <div class="ciclo">${r.ciclometria || "-"}</div>

            <div class="label">Saturazione</div>
            <div class="sat">${r.saturazione || "-"}</div>

        </div>
        `;
    });

    document.getElementById("contenuto").innerHTML = html;

})
.catch(err => {
    document.getElementById("contenuto").innerHTML = "Errore caricamento dati";
});

</script>

</body>
</html>
