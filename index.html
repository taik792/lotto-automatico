<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Elite Pro</title>

<style>
body {
    background: linear-gradient(180deg, #0b0f1a, #05070d);
    color:white;
    font-family:Arial;
    text-align:center;
}

/* TITOLI */
h1 {
    margin-top:20px;
    font-size:26px;
}

/* TOP */
.top {
    margin:20px;
}

.top span {
    display:block;
    color:#ffd700;
    font-weight:bold;
    margin:4px;
    font-size:16px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:15px;
    padding:10px;
}

/* CARD */
.card {
    border:2px solid #00ff99;
    padding:15px;
    border-radius:15px;
    background:linear-gradient(145deg, #0f1626, #0b1220);
    box-shadow:0 0 15px rgba(0,255,153,0.2);
    transition:0.2s;
}

.card:hover {
    transform:scale(1.03);
}

/* RUOTA */
.card strong {
    font-size:18px;
}

/* NUMERI */
.numeri {
    margin-top:8px;
}

/* PALLINE NUMERI */
.ball {
    display:inline-block;
    width:28px;
    height:28px;
    line-height:28px;
    border-radius:50%;
    margin:3px;
    font-size:13px;
    font-weight:bold;
}

/* COLORI DINAMICI */
.caldo {
    background:#ff3b3b;
    color:white;
}

.normale {
    background:#1e2a44;
}

.freddo {
    background:#00aaff;
    color:black;
}

/* AMBO */
.ambo {
    margin-top:10px;
}

.ambo span {
    display:inline-block;
    background:#00ff99;
    color:black;
    padding:6px 10px;
    border-radius:8px;
    margin:2px;
    font-weight:bold;
    font-size:18px;
}

/* SCORE */
.score {
    font-size:11px;
    color:#ff4d4d;
    opacity:0.5;
    margin-top:6px;
}

/* MOBILE */
@media (max-width:600px){
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>

<div class="top">
    <h2>🎯 GIOCATE CONSIGLIATE</h2>
    <div id="top"></div>

    <h2>💣 JOLLY</h2>
    <div id="jolly"></div>
</div>

<div class="grid" id="grid"></div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

    // ===== TOP =====
    let topHtml = "";
    data.giocate.forEach(g => {
        topHtml += `<span>👉 ${g.ruota} → ${g.ambo.join("-")}</span>`;
    });
    document.getElementById("top").innerHTML = topHtml;

    // ===== JOLLY =====
    document.getElementById("jolly").innerHTML =
        `<span>💣 ${data.jolly.ruota} → ${data.jolly.ambo.join("-")}</span>`;

    // ===== COLORI NUMERI =====
    function coloreNumero(n){
        if(n <= 30) return "freddo";     // 🔵 bassi
        if(n >= 60) return "caldo";      // 🔴 alti
        return "normale";                // ⚪ medi
    }

    // ===== GRID =====
    let gridHtml = "";

    Object.entries(data.ruote).forEach(([ruota, r]) => {

        let numeriHtml = "";

        r.ultima.forEach(n => {
            numeriHtml += `<span class="ball ${coloreNumero(n)}">${n}</span>`;
        });

        let amboHtml = r.ambo.map(n => `<span>${n}</span>`).join("");

        gridHtml += `
        <div class="card">
            <strong>${ruota}</strong>

            <div class="numeri">
                ${numeriHtml}
            </div>

            <div class="ambo">
                ${amboHtml}
            </div>

            <div class="score">
                Score: ${r.score.toFixed(2)}
            </div>
        </div>
        `;
    });

    document.getElementById("grid").innerHTML = gridHtml;

})
.catch(err => {
    document.body.innerHTML = "<h2 style='color:red'>Errore: " + err + "</h2>";
});
</script>

</body>
</html>
