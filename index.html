<script>
fetch("risultati.json")
  .then(res => res.json())
  .then(data => {

    // 🔥 FIX: separiamo top_pick
    const topPick = data.top_pick || [];

    // 🔥 FIX: prendiamo solo le ruote
    const ruote = Object.keys(data)
      .filter(k => k !== "top_pick")
      .map(k => data[k]);

    // =========================
    // MOSTRA TOP PICK (UGUALE A PRIMA)
    // =========================
    const topContainer = document.querySelector(".top-pick");

    if (topContainer) {
      topContainer.innerHTML = topPick.map(t => {
        return `<div>${t.ruota} → ${t.ambo.join("-")}</div>`;
      }).join("");
    }

    // =========================
    // MOSTRA RUOTE (UGUALE)
    // =========================
    const container = document.querySelector(".container");

    container.innerHTML = "";

    ruote.forEach(r => {

      container.innerHTML += `
        <div class="card">
          <h2>${r.ruota}</h2>
          <p>Ultima estrazione<br>${r.ultima.join(" - ")}</p>
          <p>Numeri caldi<br>${r.caldi.join(" - ")}</p>
          <p>Ambo forte<br>${r.ambo.join(" - ")}</p>
          <p>Ciclometria<br>${r.ciclo.join(" - ")}</p>
          <p>Indice<br>${r.indice.join(" - ")}</p>
          <p>Saturazione<br>${r.saturazione}</p>
        </div>
      `;
    });

    // 🔥 STOP LOADING
    const loading = document.querySelector(".loading");
    if (loading) loading.style.display = "none";

  })
  .catch(err => {
    console.error("Errore:", err);
  });
</script>
