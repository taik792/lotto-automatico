<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Elite Pro</title>

<style>
body {
    background: #0b0f1a;
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 { color: #00ff99; }

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    border: 2px solid #00ff99;
    border-radius: 10px;
    padding: 15px;
    margin: 10px;
    width: 220px;
}

.ambo { color: #00ff99; font-weight: bold; }
.score { color: red; }
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>

<h2>🔥 TOP GIOCATE</h2>
<div id="top"></div>

<div class="container" id="grid"></div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

    document.getElementById("top").innerHTML =
        data.top.map(r => "👉 " + r).join("<br>");

    const grid = document.getElementById("grid");

    for (let ruota in data.ruote) {

        const r = data.ruote[ruota];

        const ambi = r.ambi.map(a => a.join("-")).join(" | ");

        const giocati = r.giocati
            .map(a => "👉 " + a.join("-"))
            .join("<br>");

        const card = `
            <div class="card">
                <h3>${ruota}</h3>
                <div>Ultima: ${r.ultima.join(" - ")}</div>
                <div class="ambo">🎯 Giocati:<br>${giocati}</div>
                <div style="font-size:12px;">Altri: ${ambi}</div>
                <div class="score">Score: ${r.score}</div>
            </div>
        `;

        grid.innerHTML += card;
    }

});
</script>

</body>
</html>
