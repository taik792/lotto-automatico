<script>
fetch("risultati.json")
  .then(res => res.json())
  .then(data => {

    const ordine = [
      "Bari","Cagliari","Firenze","Genova","Milano",
      "Napoli","Palermo","Roma","Torino","Venezia"
    ];

    const container = document.getElementById("grid");
    const topBox = document.getElementById("top");

    // TOP GIOCATE
    topBox.innerHTML = data.top.map(r => {
      const ruota = data.ruote[r];
      return `${r} → ${ruota.ambo.join(" - ")}`;
    }).join("<br>");

    // TUTTE LE RUOTE
    ordine.forEach(nome => {

      const r = data.ruote[nome];

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h2>${nome}</h2>
        <p>Ultima: ${r.ultima.join(" - ")}</p>
        <p class="green">Ambo: ${r.ambo.join(" - ")}</p>
        <p class="red">Score: ${r.score}</p>
      `;

      container.appendChild(card);
    });

  });
</script>
