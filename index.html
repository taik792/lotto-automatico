<script>

fetch("risultati.json")
.then(response => response.json())
.then(data => {

    const container = document.getElementById("risultati");

    container.innerHTML = "";

    data.forEach(r => {

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
        <h2>${r.ruota}</h2>

        <p><b>Ultima estrazione</b><br>
        ${r.ultima.join(" - ")}</p>

        <p><b>Numeri caldi</b><br>
        ${r.numeri_caldi.join(" , ")}</p>

        <p><b>Ambo forte</b><br>
        ${r.ambo_forte}</p>

        <p><b>Saturazione ruota</b><br>
        ${r.saturazione}</p>
        `;

        container.appendChild(card);

    });

});

</script>
