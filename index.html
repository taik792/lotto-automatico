<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto Evolution PRO MAX</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
  text-align: center;
}

h1 {
  color: #22c55e;
  margin: 20px 0;
}

.top {
  border: 1px solid #22c55e;
  border-radius: 10px;
  padding: 15px;
  margin: 15px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  padding: 10px;
}

.card {
  background: #0f172a;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 0 10px rgba(0,255,200,0.1);
}

.card h2 {
  color: #22c55e;
  font-size: 16px;
  margin-bottom: 8px;
}

.label {
  font-size: 11px;
  color: #94a3b8;
}

.value {
  margin-bottom: 6px;
}
</style>
</head>

<body>

<h1>🔥 Lotto Evolution PRO MAX</h1>

<div class="top" id="top">
  🔥 Migliori Giocate...
</div>

<div class="container" id="cards"></div>

<script>
fetch("risultati.json?v=" + new Date().getTime())
.then(res => res.json())
.then(data => {

  const container = document.getElementById("cards");
  const topBox = document.getElementById("top");

  container.innerHTML = "";

  let ranking = [];

  Object.values(data).forEach(r => {

    // sicurezza valori
    const ultima = r.ultima || [];
    const caldi = r.caldi || [];
    const ambo = r.ambo || [];
    const ciclo = r.ciclo || [];
    const indice = r.indice || [];
    const saturazione = r.saturazione ?? "-";

    // ranking per top giocate
    const score = (indice[0] || 0) + (ciclo[0] || 0);
    ranking.push({ ruota: r.ruota, ambo, score });

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h2>${r.ruota}</h2>

      <div class="label">Ultima</div>
      <div class="value">${ultima.join(" - ")}</div>

      <div class="label">Caldi</div>
      <div class="value">${caldi.join(" - ")}</div>

      <div class="label">Ambo</div>
      <div class="value" style="color:#22c55e">${ambo.join("-")}</div>

      <div class="label">Ciclo</div>
      <div class="value" style="color:#f59e0b">${ciclo.join(" | ")}</div>

      <div class="label">Indice</div>
      <div class="value" style="color:#f43f5e">${indice.join(" | ")}</div>

      <div class="label">Saturazione</div>
      <div class="value" style="color:#38bdf8">${saturazione}</div>
    `;

    container.appendChild(card);
  });

  // TOP 3 automatiche
  ranking.sort((a,b) => b.score - a.score);

  const top3 = ranking.slice(0,3);

  topBox.innerHTML = `
    🔥 Migliori Giocate<br><br>
    ${top3.map(t => `${t.ruota} → ${t.ambo.join("-")}`).join("<br>")}
  `;

})
.catch(() => {
  document.getElementById("cards").innerHTML = "Errore caricamento dati";
});
</script>

</body>
</html>
