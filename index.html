<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<title>Lotto Evolution PRO MAX</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:30px;
}

h1{
text-align:center;
color:#00ff9c;
}

.container{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
margin-top:30px;
}

.card{

background:#1c1c1c;
padding:15px;
border-radius:10px;
border-left:4px solid #00ff9c;

}

.card h2{
color:#00ff9c;
margin-top:0;
}

.top{

border:2px solid #00ff9c;
padding:20px;
margin-bottom:30px;
border-radius:10px;
text-align:center;
font-size:20px;

}

</style>

</head>

<body>

<h1>🔥 Lotto Evolution PRO MAX</h1>

<div class="top" id="top">

Caricamento...

</div>

<div class="container" id="ruote">

</div>

<script>

fetch("risultati.json")
.then(r=>r.json())
.then(data=>{

let topHTML="🔥 Migliori Giocate del Giorno<br><br>"

data.giocate_top.forEach(g=>{

topHTML+=`${g.ruota} → ${g.ambo}<br>`

})

document.getElementById("top").innerHTML=topHTML



let ruoteHTML=""

data.ruote.forEach(r=>{

ruoteHTML+=`

<div class="card">

<h2>${r.ruota}</h2>

Ultima estrazione<br>
${r.ultima.join(" - ")}<br><br>

Numeri caldi<br>
${r.numeri_caldi.join(" - ")}<br><br>

Ambo forte<br>
${r.ambo_forte}<br><br>

Ciclometria<br>
${r.ciclometria.join(" | ")}<br><br>

Saturazione<br>
${r.saturazione}

</div>

`

})

document.getElementById("ruote").innerHTML=ruoteHTML

})

</script>

</body>

</html>
