<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Elite Pro</title>

<style>
body {
  background: #020c1b;
  color: white;
  font-family: Arial;
  margin: 0;
  padding: 15px;
}

h1 {
  text-align: center;
  color: #00ffcc;
  margin-bottom: 20px;
}

.section {
  margin-bottom: 25px;
}

.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: #06182c;
  border-radius: 12px;
  padding: 12px;
  text-align: center;
  border: 1px solid #00ffcc33;
}

.top {
  border: 2px solid gold;
  background: #1a1a00;
}

.title-small {
  font-size: 12px;
  opacity: 0.6;
}

.numbers {
  font-size: 18px;
  font-weight: bold;
  margin-top: 5px;
}

.percent {
  font-size: 12px;
  margin-top: 5px;
  color: #aaa;
}

.gemelle-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  font-size: 13px;
}
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>

<div class="section">
  <h3>🧾 Ultime Estrazioni</h3>
  <div id="estrazioni" class="grid-2"></div>
</div>

<div class="section">
  <h3>🔗 Ruote Gemelle</h3>
  <div id="gemelle" class="gemelle-grid"></div>
</div>

<div class="section">
  <h3>⭐ AMBI TOP</h3>
  <div id="ambi" class="grid-2"></div>
</div>

<div class="section">
  <h3>🔥 TERNI TOP</h3>
  <div id="terni" class="grid-2"></div>
</div>

<script src="script.js"></script>

</body>
</html>
