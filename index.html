<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto Evolution PRO MAX</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: white;
  text-align: center;
}

h1 {
  color: #00ff9c;
  margin-top: 20px;
}

.box-top {
  border: 2px solid #00ff9c;
  border-radius: 20px;
  padding: 15px;
  margin: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

.card {
  border: 2px solid #00ff9c;
  border-radius: 20px;
  padding: 15px;
  text-align: left;
}

.titolo {
  color: #00ff9c;
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 10px;
}

.label {
  color: #aaa;
  font-size: 13px;
}

.green {
  color: #00ff9c;
  font-weight: bold;
}

.red {
  color: #ff4d4d;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🔥 Lotto Evolution PRO MAX</h1>

<div id="top" class="box-top">Caricamento...</div>

<div id="grid" class="grid"></div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

  const ordine = [
    "Bari","Cagliari","Firenze","Genova",
    "Milano","Napoli","Palermo","Roma",
    "Torino","Venezia","Nazionale"
  ];

  let valori = Object.values(data);

  // 🔥 CALCOLO SCORE
  valori.forEach(r => {
    let indice = r.indice || [0,0];
    let ciclo = r.ciclo || [0,0];
    let sat = r.saturazione || 0;

    r.score =
      (indice[0] + indice[1]) * 0.4 +
      (ciclo[0] + ciclo[1]) * 0.3 +
      sat * 10;
  });

  // 🔥 SOLO BUONI
  let forti = valori.filter(r => r.score > 6);

  // 🔥 ORDINE RUOTE CORRETTO
  forti.sort((a,b) =>
    ordine.indexOf(a.ruota) - ordine.indexOf(b.ruota)
  );

  // 🔥 TOP 3
  let top = [...forti]
    .sort((a,b) => b.score - a.score)
    .slice(0,3);

  document.getElementById("top").innerHTML =
    "<b>🔥 SEGNALI ATTIVI</b><br><br>" +
    top.map(r =>
      `${r.ruota} → ${r.ambo.join(" - ")}`
    ).join("<br>");

  // 🔥 GRIGLIA
  document.getElementById("grid").innerHTML = forti.map(r => `
    <div class="card">
      <div class="titolo">${r.ruota}</div>

      <div class="label">Ultima estrazione</div>
      ${r.ultima.join(" - ")}

      <div class="label">Numeri caldi</div>
      ${r.caldi.join(" - ")}

      <div class="label">Ambo forte</div>
      <span class="green">${r.ambo.join(" - ")}</span>

      <div class="label">Score</div>
      <span class="red">${r.score.toFixed(2)}</span>
    </div>
  `).join("");

})
.catch(() => {
  document.getElementById("top").innerHTML = "Errore caricamento dati";
});
</script>

</body>
</html>
