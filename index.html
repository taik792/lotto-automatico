<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Elite Pro</title>

<style>
body {
    background: linear-gradient(180deg, #0b0f1a, #05070d);
    color:white;
    font-family:Arial;
    text-align:center;
}

/* TITOLI */
h1 {
    margin-top:20px;
}

/* ===== TOP ===== */
.top-container {
    margin:20px;
}

.top-grid {
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:10px;
}

.top-card {
    border:2px solid gold;
    border-radius:12px;
    padding:10px;
    background:#111;
}

.top-ruota {
    color:gold;
    font-size:14px;
}

.top-ambo {
    font-size:26px;
    font-weight:bold;
}

/* JOLLY */
.jolly {
    margin-top:15px;
    border:2px solid red;
    border-radius:12px;
    padding:10px;
    display:inline-block;
}

.jolly .ambo {
    font-size:22px;
    font-weight:bold;
}

/* ===== GRID ===== */
.grid {
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:15px;
    padding:10px;
}

.card {
    border:2px solid #00ff99;
    border-radius:12px;
    padding:10px;
    background:#0e1628;
}

/* NUMERI */
.ball {
    display:inline-block;
    width:30px;
    height:30px;
    line-height:30px;
    border-radius:50%;
    margin:3px;
    font-size:13px;
    font-weight:bold;
}

/* COLORI BASE */
.caldo { background:#ff3b3b; }
.freddo { background:#00aaff; color:black; }
.normale { background:#1e2a44; }

/* ⭐ ULTIMA ESTRAZIONE SOFT */
.ultima {
    background: rgba(255, 215, 0, 0.25);
    color: #ffd700;
    border: 1px solid #ffd700;
}

/* AMBO */
.ambo-box span {
    display:inline-block;
    background:#00ff99;
    color:black;
    padding:6px 12px;
    border-radius:8px;
    margin:2px;
    font-weight:bold;
    font-size:20px;
    box-shadow:0 0 8px rgba(0,255,153,0.5);
}

/* SCORE */
.score {
    font-size:11px;
    color:#ff4d4d;
    opacity:0.6;
}

/* MOBILE */
@media (max-width:600px){
    .grid, .top-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>

<!-- TOP -->
<div class="top-container">
    <h2>🎯 GIOCATE CONSIGLIATE</h2>
    <div class="top-grid" id="top"></div>

    <h2>💣 JOLLY</h2>
    <div id="jolly"></div>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

    // ===== TOP =====
    let topHtml = "";
    data.giocate.forEach(g => {
        topHtml += `
        <div class="top-card">
            <div class="top-ruota">${g.ruota}</div>
            <div class="top-ambo">${g.ambo.join(" — ")}</div>
        </div>
        `;
    });
    document.getElementById("top").innerHTML = topHtml;

    // ===== JOLLY =====
    document.getElementById("jolly").innerHTML = `
        <div class="jolly">
            ${data.jolly.ruota}<br>
            <div class="ambo">${data.jolly.ambo.join(" — ")}</div>
        </div>
    `;

    // ===== COLORI =====
    function coloreNumero(n, ultima){
        if(ultima.includes(n)) return "ultima";
        if(n <= 30) return "freddo";
        if(n >= 60) return "caldo";
        return "normale";
    }

    // ===== GRID =====
    let gridHtml = "";

    Object.entries(data.ruote).forEach(([ruota, r]) => {

        let numeri = r.ultima.map(n =>
            `<span class="ball ${coloreNumero(n, r.ultima)}">${n}</span>`
        ).join("");

        let ambo = r.ambo.map(n => `<span>${n}</span>`).join("");

        gridHtml += `
        <div class="card">
            <strong>${ruota}</strong>

            <div>${numeri}</div>

            <div class="ambo-box">${ambo}</div>

            <div class="score">
                Score: ${r.score.toFixed(2)}
            </div>
        </div>
        `;
    });

    document.getElementById("grid").innerHTML = gridHtml;

})
.catch(err => {
    document.body.innerHTML = "<h2 style='color:red'>Errore: " + err + "</h2>";
});
</script>

</body>
</html>
