<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Elite Pro</title>

<style>
body {
    background:#0b0f1a;
    color:white;
    font-family:Arial;
    text-align:center;
}

/* TITOLI */
h1 {
    margin-top:20px;
}

.top {
    margin:20px;
}

.top span {
    display:block;
    color:#ffd700;
    font-weight:bold;
    margin:3px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:15px;
    padding:10px;
}

/* CARD */
.card {
    border:2px solid #00ff99;
    padding:15px;
    border-radius:12px;
    background:#0f1626;
    box-shadow:0 0 10px rgba(0,255,153,0.2);
}

/* RUOTA */
.card strong {
    font-size:18px;
}

/* ULTIMA ESTRAZIONE */
.ultima {
    font-size:16px;
    color:#ffffff;
    margin-top:6px;
}

/* AMBO */
.ambo {
    color:#00ff99;
    font-weight:bold;
    font-size:22px;
    margin-top:10px;
}

/* SCORE */
.score {
    color:#ff4d4d;
    font-size:11px;
    opacity:0.6;
    margin-top:5px;
}

/* MOBILE */
@media (max-width:600px){
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>

<div class="top">
    <h2>🎯 GIOCATE CONSIGLIATE</h2>
    <div id="top"></div>

    <h2>💣 JOLLY</h2>
    <div id="jolly"></div>
</div>

<div class="grid" id="grid"></div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

    // ===== TOP =====
    let topHtml = "";
    data.giocate.forEach(g => {
        topHtml += `<span>👉 ${g.ruota} → ${g.ambo.join("-")}</span>`;
    });
    document.getElementById("top").innerHTML = topHtml;

    // ===== JOLLY =====
    document.getElementById("jolly").innerHTML =
        `<span>💣 ${data.jolly.ruota} → ${data.jolly.ambo.join("-")}</span>`;

    // ===== GRID =====
    let gridHtml = "";

    Object.entries(data.ruote).forEach(([ruota, r]) => {

        // 🔥 sostituisce trattini con punti
        const ultima = r.ultima.join(" • ");

        gridHtml += `
        <div class="card">
            <strong>${ruota}</strong>
            <div class="ultima">${ultima}</div>
            <div class="ambo">${r.ambo.join("-")}</div>
            <div class="score">Score: ${r.score.toFixed(2)}</div>
        </div>
        `;
    });

    document.getElementById("grid").innerHTML = gridHtml;

})
.catch(err => {
    document.body.innerHTML = "<h2 style='color:red'>Errore: " + err + "</h2>";
});
</script>

</body>
</html>
