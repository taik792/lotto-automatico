<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto Elite Pro</title>

<style>
body {
    background: #020617;
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: #00ffa2;
}

.top-container {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px;
}

.top-box {
    border: 2px solid gold;
    padding: 10px;
    border-radius: 10px;
    min-width: 90px;
}

.jolly {
    margin: 15px;
    padding: 10px;
    border: 2px solid red;
    display: inline-block;
    border-radius: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    padding: 20px;
}

.card {
    border: 2px solid #00ffa2;
    border-radius: 12px;
    padding: 10px;
}

.ball {
    display: inline-block;
    background: #444;
    border-radius: 50%;
    padding: 6px 10px;
    margin: 3px;
}

.ambo {
    margin-top: 10px;
    font-size: 20px;
    color: #00ffa2;
}

.score {
    font-size: 12px;
    color: red;
}
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>

<h2>🎯 GIOCATE CONSIGLIATE</h2>

<div id="top" class="top-container"></div>

<div>
    <h3>💣 JOLLY</h3>
    <div id="jolly" class="jolly"></div>
</div>

<div id="grid" class="grid"></div>

<script>
fetch('risultati.json')
.then(res => res.json())
.then(data => {

    // TOP
    const topDiv = document.getElementById("top");
    topDiv.innerHTML = "";

    data.top.forEach(r => {
        const ambo = data.ruote[r].ambo;
        topDiv.innerHTML += `
            <div class="top-box">
                <b>${r}</b><br>
                ${ambo[0]} - ${ambo[1]}
            </div>
        `;
    });

    // JOLLY
    const j = data.jolly;
    const jAmbo = data.ruote[j].ambo;

    document.getElementById("jolly").innerHTML =
        `<b>${j}</b><br>${jAmbo[0]} - ${jAmbo[1]}`;

    // GRIGLIA
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    Object.keys(data.ruote).forEach(r => {

        const ruota = data.ruote[r];

        const balls = ruota.ultima.map(n =>
            `<span class="ball">${n}</span>`
        ).join("");

        grid.innerHTML += `
            <div class="card">
                <h3>${r}</h3>
                <div>${balls}</div>
                <div class="ambo">${ruota.ambo[0]} - ${ruota.ambo[1]}</div>
                <div class="score">Score: ${ruota.score}</div>
            </div>
        `;
    });

});
</script>

</body>
</html>
