<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Evolution PRO MAX</title>

<style>
body {
  background: #020617;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  color: #22c55e;
}

.box-top {
  border: 1px solid #22c55e;
  padding: 15px;
  margin: 20px;
  border-radius: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  padding: 10px;
}

.card {
  background: #0f172a;
  border-radius: 12px;
  padding: 10px;
}

.ruota {
  color: #22c55e;
  font-weight: bold;
}

.label {
  color: #94a3b8;
  font-size: 12px;
}

.ambo {
  color: #22c55e;
}

.ciclo {
  color: orange;
}

.indice {
  color: #f43f5e;
}

.sat {
  color: #38bdf8;
}
</style>
</head>

<body>

<h1>🔥 Lotto Evolution PRO MAX</h1>

<div class="box-top" id="top"></div>

<div class="grid" id="grid"></div>

<script>
fetch("risultati.json?v=" + new Date().getTime())
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("cards");
    container.innerHTML = "";

    Object.values(data).forEach(r => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h2>${r.ruota}</h2>

        <div class="label">Ultima</div>
        <div>${r.ultima.join(" - ")}</div>

        <div class="label">Caldi</div>
        <div>${r.caldi.join(" - ")}</div>

        <div class="label">Ambo</div>
        <div style="color:#22c55e">${r.ambo.join("-")}</div>

        <div class="label">Ciclo</div>
        <div style="color:#f59e0b">${r.ciclo.join(" | ")}</div>

        <div class="label">Indice</div>
        <div style="color:#f43f5e">${r.indice.join(" | ")}</div>

        <div class="label">Saturazione</div>
        <div style="color:#38bdf8">${r.saturazione}</div>
      `;

      container.appendChild(card);
    });

  })
  .catch(() => {
    document.getElementById("cards").innerHTML = "Errore caricamento dati";
  });
</script>

</body>
</html>
