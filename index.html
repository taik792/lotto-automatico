<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Evolution PRO MAX</title>

<style>
body {
    background: #050b1a;
    font-family: Arial;
    color: white;
    text-align: center;
}

/* TITOLO */
h1 {
    color: #00ff88;
    font-size: 42px;
    margin: 20px 0;
}

/* GRIGLIA */
.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 25px;
    padding: 20px;
}

/* PC */
@media (min-width: 900px) {
    .container {
        grid-template-columns: repeat(4, 1fr);
        max-width: 1400px;
        margin: auto;
    }
}

/* CARD */
.card {
    background: #0a162b;
    border: 2px solid #00ff88;
    border-radius: 18px;
    padding: 25px;
    box-shadow: 0 0 15px #00ff8840;
}

/* RUOTA */
.ruota {
    font-size: 26px;
    font-weight: bold;
    color: #00ff88;
    margin-bottom: 10px;
}

/* TESTI */
.label {
    font-size: 16px;
    color: #aaa;
}

.valori {
    font-size: 20px;
    margin-bottom: 10px;
}

/* AMBO */
.ambo {
    font-size: 24px;
    color: #00ff88;
    font-weight: bold;
}

/* CICLO */
.ciclo {
    font-size: 20px;
    color: orange;
}

/* INDEX */
.index {
    font-size: 26px;
    color: #ff4d6d;
    font-weight: bold;
}

/* SATURAZIONE */
.sat {
    font-size: 18px;
    color: #00cfff;
}
</style>

</head>

<body>

<h1>🔥 Lotto Evolution PRO MAX</h1>

<div id="contenitore" class="container">Caricamento...</div>

<script>
fetch("./risultati.json")
.then(res => res.json())
.then(data => {

    const cont = document.getElementById("contenitore");
    cont.innerHTML = "";

    for (let ruota in data) {

        let r = data[ruota];

        cont.innerHTML += `
            <div class="card">
                <div class="ruota">${ruota}</div>

                <div class="label">Ultima</div>
                <div class="valori">${r.ultima.join(" - ")}</div>

                <div class="label">Caldi</div>
                <div class="valori">${r.caldi.join(" - ")}</div>

                <div class="label">Ambo</div>
                <div class="ambo">${r.ambo[0]} - ${r.ambo[1]}</div>

                <div class="label">Ciclo</div>
                <div class="ciclo">${r.ciclo[0]} | ${r.ciclo[1]}</div>

                <div class="label">Indice</div>
                <div class="index">${r.indice[0]} | ${r.indice[1]}</div>

                <div class="label">Saturazione</div>
                <div class="sat">${r.saturazione}</div>
            </div>
        `;
    }

});
</script>

</body>
</html>
