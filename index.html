<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Evolution PRO MAX</title>

<style>
body {
  background: #0b0f1a;
  color: white;
  font-family: Arial;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #00ff99;
}

.top-pick {
  border: 1px solid #00ff99;
  padding: 15px;
  margin: 20px auto;
  max-width: 500px;
  text-align: center;
  border-radius: 10px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

.card {
  border: 1px solid #00ff99;
  padding: 10px;
  border-radius: 10px;
}

.highlight {
  color: #00ff99;
  font-weight: bold;
}

.red {
  color: #ff4d4d;
}

.loading {
  text-align: center;
  margin-top: 30px;
}
</style>
</head>

<body>

<h1>🔥 Lotto Evolution PRO MAX</h1>

<div class="top-pick loading">Caricamento...</div>

<div class="container"></div>

<script>
fetch("risultati.json")
  .then(res => res.json())
  .then(data => {

    const safe = (arr) => Array.isArray(arr) ? arr.join(" - ") : "";

    const topPick = data.top_pick || [];

    const ruote = Object.keys(data)
      .filter(k => k !== "top_pick")
      .map(k => data[k]);

    // =========================
    // TOP PICK
    // =========================
    const topBox = document.querySelector(".top-pick");

    let htmlTop = "<h3>🔥 Migliori Giocate</h3>";

    topPick.forEach(t => {
      if (t.ruota && t.ambo) {
        htmlTop += `<div>${t.ruota} → ${safe(t.ambo)}</div>`;
      }
    });

    topBox.innerHTML = htmlTop;

    // =========================
    // CARDS
    // =========================
    const container = document.querySelector(".container");
    container.innerHTML = "";

    ruote.forEach(r => {

      if (!r || !r.ruota) return;

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h2>${r.ruota}</h2>

        <p>Ultima estrazione<br>${safe(r.ultima)}</p>

        <p>Numeri caldi<br>${safe(r.caldi)}</p>

        <p>Ambo forte<br><span class="highlight">${safe(r.ambo)}</span></p>

        <p>Ciclometria<br>${safe(r.ciclo)}</p>

        <p>Indice<br><span class="red">${safe(r.indice)}</span></p>

        <p>Saturazione<br>${r.saturazione ?? ""}</p>
      `;

      container.appendChild(card);
    });

  })
  .catch(err => {
    console.error(err);
    document.body.innerHTML = "<h2 style='color:white'>Errore caricamento dati</h2>";
  });
</script>

</body>
</html>
