<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Elite Pro</title>

<style>
body {
  background: #020c1b;
  color: white;
  font-family: Arial;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #00ffcc;
}

.section {
  margin: 25px 0;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: #06182c;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  border: 1px solid #0ff;
}

.top {
  border: 2px solid gold;
  background: #1a1a00;
}

.small {
  font-size: 12px;
  opacity: 0.7;
}

.highlight {
  font-size: 22px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>

<div class="section">
  <h3>🧾 Ultime Estrazioni</h3>
  <div id="estrazioni" class="grid"></div>
</div>

<div class="section">
  <h3>🔗 Ruote Gemelle</h3>
  <div id="gemelle"></div>
</div>

<div class="section">
  <h3>⭐ AMBI TOP</h3>
  <div id="ambi" class="grid"></div>
</div>

<div class="section">
  <h3>🔥 TERNI TOP</h3>
  <div id="terni" class="grid"></div>
</div>

<script src="script.js"></script>

</body>
</html>
