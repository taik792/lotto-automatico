<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Elite Pro</title>

<style>
body {
    background:#0b0f1a;
    color:white;
    font-family:Arial;
    text-align:center;
}

/* TOP */
.top {
    margin:20px;
}

.top span {
    display:block;
    color:#ffd700;
    font-weight:bold;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap:15px;
    padding:10px;
}

/* CARD */
.card {
    border:2px solid #00ff99;
    padding:10px;
    border-radius:10px;
}

.ambo {
    color:#00ff99;
    font-weight:bold;
}

.ultima {
    font-size:12px;
    color:#ccc;
}

.score {
    color:red;
    font-size:12px;
}
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>

<div class="top">
    <h2>🎯 GIOCATE CONSIGLIATE</h2>
    <div id="top"></div>

    <h2>💣 JOLLY</h2>
    <div id="jolly"></div>
</div>

<div class="grid" id="grid"></div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

    // ===== TOP =====
    let topHtml = "";

    data.giocate.forEach(g => {
        topHtml += `<span>👉 ${g.ruota} → ${g.ambo.join("-")}</span>`;
    });

    document.getElementById("top").innerHTML = topHtml;

    // ===== JOLLY =====
    document.getElementById("jolly").innerHTML =
        `<span>💣 ${data.jolly.ruota} → ${data.jolly.ambo.join("-")}</span>`;

    // ===== GRID RUOTE =====
    let gridHtml = "";

    Object.entries(data.ruote).forEach(([ruota, r]) => {

        const ultima = r.ultima.join(" - ");

        gridHtml += `
        <div class="card">
            <strong>${ruota}</strong><br>
            <div class="ultima">Ultima: ${ultima}</div><br>
            <div class="ambo">${r.ambo.join("-")}</div>
            <div class="score">Score: ${r.score.toFixed(2)}</div>
        </div>
        `;
    });

    document.getElementById("grid").innerHTML = gridHtml;

})
.catch(err => {
    document.body.innerHTML = "<h2 style='color:red'>Errore: " + err + "</h2>";
});
</script>

</body>
</html>
