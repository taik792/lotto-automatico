<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<title>Lotto Evolution PRO MAX</title>

<style>

body{
font-family:Arial;
background:#121212;
color:white;
margin:0;
}

header{
text-align:center;
padding:30px;
background:#0d0d0d;
border-bottom:3px solid #00ff9c;
}

h1{
color:#00ff9c;
}

.container{
width:90%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#1e1e1e;
padding:20px;
border-radius:10px;
border-left:4px solid #00ff9c;
}

.card h2{
color:#00ff9c;
margin-top:0;
}

.section{
margin-top:10px;
}

.top{
width:90%;
margin:auto;
margin-top:20px;
background:#1e1e1e;
padding:20px;
border-radius:10px;
border:2px solid #00ff9c;
}

.top h2{
color:#00ff9c;
text-align:center;
}

.play{
font-size:20px;
text-align:center;
margin:10px;
}

</style>
</head>

<body>

<header>
<h1>Lotto Evolution PRO MAX</h1>
</header>

<div class="top">
<h2>🔥 Migliori Giocate del Giorno</h2>
<div id="giocate"></div>
</div>

<div class="container" id="ruote"></div>

<script>

fetch("risultati.json")
.then(res => res.json())
.then(data => {

let ruote = document.getElementById("ruote")
let giocate = document.getElementById("giocate")

data.giocate_top.forEach(g=>{

let div=document.createElement("div")

div.className="play"

div.innerHTML=`${g.ruota} → ${g.ambo}`

giocate.appendChild(div)

})

data.ruote.forEach(r=>{

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<h2>${r.ruota}</h2>

<div class="section">
Ultima estrazione<br>
${r.ultima.join(" - ")}
</div>

<div class="section">
Numeri caldi<br>
${r.numeri_caldi.join(" - ")}
</div>

<div class="section">
Ambo forte<br>
${r.ambo_forte}
</div>

<div class="section">
Ciclometria<br>
${r.ciclometria.join(" | ")}
</div>

<div class="section">
Saturazione<br>
${r.saturazione}
</div>

`

ruote.appendChild(card)

})

})

</script>

</body>
</html>
