<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Elite AI</title>

<style>
body {
    background: #020617;
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: #00ff99;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 10px;
}

.card {
    border: 2px solid #00ff99;
    border-radius: 15px;
    padding: 10px;
}

.green { color: #00ff99; }
.red { color: #ff4d4d; }

.topbox {
    border: 2px solid #00ff99;
    border-radius: 15px;
    padding: 15px;
    margin: 15px;
}
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE AI</h1>

<div class="topbox" id="top"></div>

<div class="grid" id="grid"></div>

<script>

// 🔥 DATI (simulazione)
let data = {
    Bari: {ultima:[53,4,1,11,9], caldi:[75,51]},
    Milano: {ultima:[7,79,84,28,37], caldi:[34,77]},
    Roma: {ultima:[81,66,45,53,8], caldi:[78,66]},
    Torino: {ultima:[29,47,55,78,71], caldi:[80,21]},
    Firenze: {ultima:[13,48,58,39,15], caldi:[67,19]},
    Venezia: {ultima:[7,29,76,14,15], caldi:[85,69]},
    Napoli: {ultima:[26,90,68,82,67], caldi:[80,85]},
    Palermo: {ultima:[38,57,65,20,56], caldi:[88,84]},
    Genova: {ultima:[52,87,51,79,67], caldi:[2,19]},
    Cagliari: {ultima:[67,19,47,35,64], caldi:[23,47]}
};

// 🔥 STORAGE
let storico = JSON.parse(localStorage.getItem("storico")) || [];

// 🔥 CALCOLO SCORE
function calcolaScore(caldi, ultima) {
    let score = 0;

    caldi.forEach(n => {
        if (!ultima.includes(n)) score += 5;
        if (n % 2 === 0) score += 2;
    });

    return score.toFixed(2);
}

// 🔥 CREA PREVISIONI
let risultati = [];

for (let ruota in data) {

    let caldi = data[ruota].caldi;
    let ultima = data[ruota].ultima;

    let score = calcolaScore(caldi, ultima);

    risultati.push({
        ruota,
        ambo: caldi,
        score: parseFloat(score)
    });
}

// 🔥 ORDINA
risultati.sort((a,b)=>b.score-a.score);

// 🔥 TOP 3
let top = risultati.slice(0,3);

// 🔥 SALVA NELLO STORICO
storico.push({
    data: new Date().toLocaleString(),
    previsioni: risultati
});

localStorage.setItem("storico", JSON.stringify(storico));

// 🔥 MOSTRA TOP
let topDiv = document.getElementById("top");
topDiv.innerHTML = "<h2>🔥 SEGNALI TOP</h2>" +
top.map(t => `${t.ruota} → ${t.ambo[0]} - ${t.ambo[1]}`).join("<br>");

// 🔥 GRID
let grid = document.getElementById("grid");

risultati.forEach(r => {
    grid.innerHTML += `
    <div class="card">
        <h3>${r.ruota}</h3>
        Ultima: ${data[r.ruota].ultima.join(" - ")}<br>
        Caldi: ${r.ambo.join(" - ")}<br>
        <span class="green">Ambo: ${r.ambo.join(" - ")}</span><br>
        Score: <span class="red">${r.score}</span>
    </div>
    `;
});

</script>

</body>
</html>
