<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Evolution PRO MAX</title>

<style>
body {
    background: #050b1a;
    font-family: Arial;
    color: white;
    text-align: center;
}

/* TITOLO */
h1 {
    color: #00ff88;
    font-size: 40px;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: #0a162b;
    border: 2px solid #00ff88;
    border-radius: 15px;
    padding: 20px;
}

/* RUOTA */
.ruota {
    color: #00ff88;
    font-size: 26px;
    margin-bottom: 10px;
}

/* AMBO */
.ambo {
    font-size: 30px;
    color: #00ff88;
    margin: 10px 0;
}

/* INDEX GIGANTE */
.index {
    font-size: 42px;
    font-weight: bold;
    color: #ff4d6d;
    margin-top: 10px;
}
</style>

</head>
<body>

<h1>🔥 Lotto Evolution PRO MAX</h1>

<div class="container" id="contenitore"></div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

    const cont = document.getElementById("contenitore");

    for (let ruota in data) {

        let r = data[ruota];

        cont.innerHTML += `
            <div class="card">
                <div class="ruota">${ruota}</div>

                <div class="ambo">
                    ${r.ambo[0]} - ${r.ambo[1]}
                </div>

                <div class="index">
                    ${r.indice[0]} | ${r.indice[1]}
                </div>
            </div>
        `;
    }
});
</script>

</body>
</html>
