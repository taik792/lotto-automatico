<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Evolution PRO MAX</title>

<style>
body {
    background: #050b1a;
    font-family: Arial;
    color: white;
    text-align: center;
}

/* TITOLO */
h1 {
    color: #00ff88;
    font-size: 42px;
    margin-top: 20px;
}

/* CONTENITORE */
.container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 30px;
    padding: 40px;
    max-width: 1400px;
    margin: auto;
}

/* CARD */
.card {
    background: #0a162b;
    border: 2px solid #00ff88;
    border-radius: 18px;
    padding: 30px;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* RUOTA */
.ruota {
    font-size: 24px;
    font-weight: bold;
    color: #00ff88;
}

/* AMBO */
.ambo {
    font-size: 28px;
    margin: 10px 0;
    color: #00ff88;
}

/* INDEX */
.index {
    font-size: 34px;
    font-weight: bold;
    color: #ff4d6d;
}
</style>

</head>

<body>

<h1>🔥 Lotto Evolution PRO MAX</h1>

<div class="container" id="contenitore"></div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

    const cont = document.getElementById("contenitore");

    for (let ruota in data) {

        let r = data[ruota];

        cont.innerHTML += `
            <div class="card">
                <div class="ruota">${ruota}</div>

                <div class="ambo">
                    ${r.ambo[0]} - ${r.ambo[1]}
                </div>

                <div class="index">
                    ${r.indice[0]} | ${r.indice[1]}
                </div>
            </div>
        `;
    }

})
.catch(err => {
    document.getElementById("contenitore").innerHTML = "Errore caricamento dati";
});
