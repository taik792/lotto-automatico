<!DOCTYPE html>
<html>
<head>
<title>Lotto Evolution PRO MAX</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
}

.card{
border:2px solid orange;
padding:15px;
margin:15px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>🔥 Lotto Evolution PRO MAX</h1>

<div id="risultati"></div>

<script>

fetch("risultati.json")
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(r=>{

html+=`
<div class="card">

<h2>${r.ruota}</h2>

<p>Numeri caldi: ${r.numeri.join(", ")}</p>

<p>Ambo forte: ${r.ambi[0][0].join(" - ")}</p>

</div>
`;

});

document.getElementById("risultati").innerHTML=html;

});

</script>

</body>
</html>
