<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Elite Pro</title>

<style>
body {
  background: #050816;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  color: #00ff99;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  border: 2px solid #00ff99;
  border-radius: 15px;
  padding: 15px;
}

.green { color: #00ff99; }
.red { color: #ff4d4d; }
</style>

</head>
<body>

<h1>🔥 LOTTO ELITE PRO</h1>

<div id="top"></div>

<div class="container" id="grid"></div>

<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

  const ordine = [
    "Bari","Cagliari","Firenze","Genova","Milano",
    "Napoli","Palermo","Roma","Torino","Venezia"
  ];

  const grid = document.getElementById("grid");
  const top = document.getElementById("top");

  // 🔥 TOP
  top.innerHTML = `
    <h2>🔥 TOP GIOCATE</h2>
    ${data.top.map(r => {
      const ruota = data.ruote[r];
      return `${r} → ${ruota.ambo.join(" - ")}`;
    }).join("<br>")}
  `;

  // 🔥 TUTTE LE RUOTE
  ordine.forEach(nome => {

    const r = data.ruote[nome];

    // sicurezza (evita crash)
    if (!r) return;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${nome}</h3>
      <p>Ultima: ${r.ultima.join(" - ")}</p>
      <p class="green">Ambo: ${r.ambo.join(" - ")}</p>
      <p class="red">Score: ${r.score}</p>
    `;

    grid.appendChild(card);
  });

})
.catch(err => {
  document.body.innerHTML = "❌ ERRORE JS: " + err;
});
</script>

</body>
</html>
