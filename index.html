<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Evolution PRO MAX</title>

<style>
body {
    background: #0b0f14;
    color: #e6edf3;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: #00d4ff;
}

#top {
    border: 1px solid #00d4ff;
    border-radius: 12px;
    padding: 15px;
    margin: 20px;
    background: #111821;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: #111821;
    border: 1px solid #1f2a36;
    border-radius: 10px;
    margin: 10px;
    padding: 10px;
    width: 170px;
}

.sat-alta { color: #00ffa6; }
.sat-media { color: #ffd166; }
.sat-bassa { color: #ff6b6b; }
</style>
</head>

<body>

<h1>🔥 Lotto Evolution PRO MAX</h1>

<div id="top">
    <h3>🔥 Migliori Giocate</h3>
    <div id="top-content">Caricamento...</div>
</div>

<div class="container" id="ruote"></div>

<script>

fetch("risultati.json")
.then(r => r.json())
.then(data => {

    console.log("JSON:", data); // debug

    // 🔥 TOP
    let top = "";
    if (data.giocate_top) {
        data.giocate_top.forEach(g => {
            top += `<p>${g.ruota} → ${g.ambo}</p>`;
        });
    }
    document.getElementById("top-content").innerHTML = top || "Nessuna giocata";

    // 🎯 RUOTE
    let html = "";

    if (!data.ruote) {
        document.getElementById("ruote").innerHTML = "ERRORE: ruote non trovate";
        return;
    }

    data.ruote.forEach(r => {

        let satClass = "sat-bassa";
        if (r.saturazione >= 2.5) satClass = "sat-alta";
        else if (r.saturazione >= 1.5) satClass = "sat-media";

        html += `
        <div class="card">
            <h3>${r.ruota}</h3>

            <p>Ultima:<br>${(r.ultima || []).join(" - ")}</p>

            <p>Caldi:<br>${(r.numeri_caldi || []).join(" - ")}</p>

            <p>Ambo:<br>${r.ambo_forte || "-"}</p>

            <p>Ciclo:<br>${(r.ciclometria || []).join(" | ")}</p>

            <p>Saturazione:<br>
            <span class="${satClass}">${r.saturazione || 0}</span></p>
        </div>
        `;
    });

    document.getElementById("ruote").innerHTML = html;

})
.catch(err => {
    console.error(err);
    document.body.innerHTML += "<p>Errore caricamento dati</p>";
});

</script>

</body>
</html>
