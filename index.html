<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Evolution PRO MAX</title>

<style>

body{
background:#0d0d0d;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:20px;
}

.container{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
padding:20px;
}

.box{
border:2px solid orange;
border-radius:10px;
padding:15px;
background:#111;
}

.ruota{
color:#00ff88;
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.label{
color:#ccc;
font-size:14px;
margin-top:6px;
}

.value{
font-size:15px;
margin-top:2px;
}

</style>
</head>

<body>

<h1>Lotto Evolution PRO MAX</h1>

<div class="container" id="ruote"></div>

<script>

fetch("risultati.json")
.then(r=>r.json())
.then(data=>{

const container = document.getElementById("ruote")

data.ruote.forEach(r=>{

const box = document.createElement("div")
box.className="box"

box.innerHTML=`

<div class="ruota">${r.ruota}</div>

<div class="label">Ultima estrazione</div>
<div class="value">${r.ultima.join(" - ")}</div>

<div class="label">Numeri caldi</div>
<div class="value">${r.numeri_caldi.join(", ")}</div>

<div class="label">Ambo forte</div>
<div class="value">${r.ambo_forte}</div>

<div class="label">🔥 Ambi statistici</div>
<div class="value">${r.ambi_statistici.join(" | ")}</div>

<div class="label">Ambi ciclometrici</div>
<div class="value">${r.ciclometria.join(" | ")}</div>

<div class="label">Saturazione ruota</div>
<div class="value">${r.saturazione}</div>

`

container.appendChild(box)

})

})

</script>

</body>
</html>
