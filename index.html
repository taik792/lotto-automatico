<script>
fetch("risultati.json")
  .then(res => res.json())
  .then(data => {

    console.log("DATI:", data);

    const topPick = data.top_pick || [];

    const ruote = Object.keys(data)
      .filter(k => k !== "top_pick")
      .map(k => data[k]);

    // =========================
    // TOP PICK
    // =========================
    const topContainer = document.querySelector(".top-pick");

    if (topContainer && topPick.length > 0) {
      topContainer.innerHTML = "";

      topPick.forEach(t => {
        const div = document.createElement("div");
        div.textContent = `${t.ruota} → ${t.ambo.join("-")}`;
        topContainer.appendChild(div);
      });
    }

    // =========================
    // RUOTE
    // =========================
    const container =
      document.querySelector(".container") ||
      document.querySelector(".cards") ||
      document.body; // fallback

    container.innerHTML = "";

    ruote.forEach(r => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h2>${r.ruota}</h2>
        <p>Ultima estrazione<br>${r.ultima.join(" - ")}</p>
        <p>Numeri caldi<br>${r.caldi.join(" - ")}</p>
        <p>Ambo forte<br>${r.ambo.join(" - ")}</p>
        <p>Ciclometria<br>${r.ciclo.join(" - ")}</p>
        <p>Indice<br>${r.indice.join(" - ")}</p>
        <p>Saturazione<br>${r.saturazione}</p>
      `;

      container.appendChild(card);
    });

    // =========================
    // STOP LOADING
    // =========================
    const loading =
      document.querySelector(".loading") ||
      document.querySelector(".loader");

    if (loading) {
      loading.style.display = "none";
    }

  })
  .catch(err => {
    console.error("ERRORE:", err);
    document.body.innerHTML = "<h2 style='color:white'>Errore caricamento dati</h2>";
  });
</script>
