<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {background:#020617;color:white;font-family:Arial;text-align:center;}
h1 {color:#00ff9c;}
.grid {display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:15px;}
.card {border:2px solid #00ff9c;border-radius:15px;padding:10px;text-align:left;}
.green {color:#00ff9c;}
.red {color:#ff4d4d;}
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE</h1>

<div id="top"></div>
<div class="grid" id="grid"></div>

<script>
fetch("risultati.json")
.then(r=>r.json())
.then(data=>{

  let arr = Object.values(data)
    .filter(x => x.score > 5)
    .sort((a,b)=>b.score-a.score);

  document.getElementById("top").innerHTML =
    "<h3>🔥 SEGNALI TOP</h3>" +
    arr.slice(0,3).map(x =>
      `${x.ruota} → ${x.ambo.join(" - ")}`
    ).join("<br>");

  document.getElementById("grid").innerHTML =
    arr.map(r=>`
      <div class="card">
        <b>${r.ruota}</b><br>
        Ultima: ${r.ultima.join(" - ")}<br>
        Caldi: ${r.caldi.join(" - ")}<br>
        Ambo: <span class="green">${r.ambo.join(" - ")}</span><br>
        Score: <span class="red">${r.score}</span>
      </div>
    `).join("");

});
</script>

</body>
</html>
