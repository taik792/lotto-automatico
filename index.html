<script>
fetch("risultati.json")
.then(res => res.json())
.then(data => {

    let topHTML = "";
    data.giocate_top.forEach(g => {
        topHTML += `<p>${g.ruota} → ${g.ambo}</p>`;
    });
    document.getElementById("giocate").innerHTML = topHTML;

    let html = "";

    data.ruote.forEach(r => {

        let ultima = Array.isArray(r.ultima) ? r.ultima.join(" - ") : "-";
        let caldi = Array.isArray(r.numeri_caldi) ? r.numeri_caldi.join(" - ") : "-";
        let ciclo = Array.isArray(r.ciclometria) ? r.ciclometria.join(" | ") : "-";

        html += `
        <div class="card">
            <h3>${r.ruota || "-"}</h3>

            <p><b>Ultima</b><br>${ultima}</p>

            <p><b>Numeri caldi</b><br>${caldi}</p>

            <p><b>Ambo</b><br>${r.ambo_forte || "-"}</p>

            <p><b>Ciclometria</b><br>${ciclo}</p>

            <p><b>Saturazione</b><br>${r.saturazione ?? "-"}</p>
        </div>
        `;
    });

    document.getElementById("contenitore").innerHTML = html;

});
</script>
