<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { background:#020617; color:white; font-family:Arial; text-align:center; }
.box {
    border:2px solid #00ff99;
    border-radius:12px;
    padding:10px;
    margin:10px;
    display:inline-block;
    width:220px;
}
.green { color:#00ff99; }
.red { color:#ff4d4d; }
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>

<div id="top"></div>
<div id="container"></div>

<script>

async function load(){

const res = await fetch("risultati.json").then(r=>r.json());
const est = await fetch("estrazioni.json").then(r=>r.json());

let topHTML = "<h3>TOP GIOCATE</h3>";

Object.values(res).slice(0,3).forEach(r=>{
    topHTML += `${r.ruota} → ${r.ambo.join(" - ")}<br>`;
});

document.getElementById("top").innerHTML = topHTML;

let html = "";

Object.values(res).forEach(r=>{

    let ultima = est[r.ruota];
    ultima = ultima[ultima.length - 1];

    html += `
    <div class="box">
        <b>${r.ruota}</b><br>
        Ultima: ${ultima.join(" - ")}<br>
        <span class="green">Ambo: ${r.ambo.join(" - ")}</span><br>
        <span class="red">Score: ${r.score}</span>
    </div>
    `;
});

document.getElementById("container").innerHTML = html;

}

load();

</script>

</body>
</html>
