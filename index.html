<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lotto Elite PRO</title>

<style>
body {
    background:#020617;
    color:#fff;
    font-family:Arial;
    margin:0;
    padding:20px;
}

h1 {
    text-align:center;
    color:#00ff99;
}

.top {
    border:2px solid #00ff99;
    border-radius:15px;
    padding:15px;
    text-align:center;
    margin-bottom:20px;
}

.container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.box {
    border:2px solid #00ff99;
    border-radius:15px;
    padding:10px;
    margin:10px;
    width:280px;
}

.title {
    color:#00ff99;
    font-weight:bold;
    font-size:18px;
}

.green { color:#00ff99; }
.red { color:#ff4d4d; }
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO</h1>

<div class="top" id="top"></div>

<div class="container" id="container"></div>

<script>

const ordineRuote = [
    "Bari","Cagliari","Firenze","Genova",
    "Milano","Napoli","Palermo","Roma",
    "Torino","Venezia"
];

async function load() {

    const risultati = await fetch("risultati.json").then(r=>r.json());
    const estrazioni = await fetch("estrazioni.json").then(r=>r.json());

    const container = document.getElementById("container");

    // 🔥 TOP 3
    let htmlTop = "<h3>🔥 SEGNALI TOP</h3>";

    const top = Object.values(risultati)
        .sort((a,b)=>b.score - a.score)
        .slice(0,3);

    top.forEach(t=>{
        htmlTop += `${t.ruota} → ${t.ambo.join(" - ")}<br>`;
    });

    document.getElementById("top").innerHTML = htmlTop;

    // 🔥 RUOTE ORDINATE
    ordineRuote.forEach(ruota => {

        const r = risultati[ruota];
        if (!r) return;

        // ✅ PRENDE SOLO L'ULTIMA ESTRAZIONE
        const lista = estrazioni[ruota] || [];
        const ultima = lista.length ? lista[lista.length - 1] : [];

        container.innerHTML += `
        <div class="box">
            <div class="title">${ruota}</div>

            <div>Ultima: ${ultima.join(" - ")}</div>

            <div>Caldi: ${r.caldi.join(" - ")}</div>

            <div class="green">
                Ambo: ${r.ambo.join(" - ")}
            </div>

            <div class="red">
                Score: ${r.score}
            </div>
        </div>
        `;
    });

}

load();

</script>

</body>
</html>
