<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Evolution PRO MAX</title>

<style>
body {
  background: #020617;
  color: white;
  font-family: Arial;
  margin: 0;
  padding: 15px;
}

h1 {
  text-align: center;
  color: #00ff99;
}

.top {
  border: 2px solid #00ff99;
  border-radius: 12px;
  padding: 12px;
  text-align: center;
  margin-bottom: 20px;
  font-size: 18px;
}

.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

@media (min-width: 768px) {
  .container {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (min-width: 1200px) {
  .container {
    grid-template-columns: repeat(5, 1fr);
  }
}

.card {
  border: 1px solid #00ff99;
  border-radius: 12px;
  padding: 12px;
  background: #020617;
}

.title {
  font-size: 18px;
  color: #00ff99;
  margin-bottom: 8px;
}

.label {
  color: #aaa;
  font-size: 13px;
}

.value {
  margin-bottom: 6px;
}

.green {
  color: #00ff99;
}

.red {
  color: #ff4d4d;
}

.empty {
  text-align: center;
  margin-top: 40px;
  color: #888;
}
</style>
</head>

<body>

<h1>🔥 Lotto Evolution PRO MAX</h1>

<div class="top" id="top">Analisi in corso...</div>

<div class="container" id="cards"></div>

<script>
fetch("risultati.json")
.then(res => {
  if (!res.ok) throw new Error("JSON non trovato");
  return res.json();
})
.then(data => {

  let valori = Object.values(data).filter(r => r);

  // 🔥 CALCOLO SCORE PRO
  valori.forEach(r => {

    let indice = r.indice || [0,0];
    let ciclo = r.ciclo || [0,0];
    let sat = r.saturazione || 0;

    let score =
      (indice[0] + indice[1]) * 0.4 +
      (ciclo[0] + ciclo[1]) * 0.3 +
      sat * 10;

    r.score = score;
  });

  // 🔥 FILTRO SECCO (CORE DEL SISTEMA)
  let forti = valori.filter(r => r.score > 6);

  // 🔥 TOP SOLO TRA I FORTI
  let top = forti
    .sort((a,b) => b.score - a.score)
    .slice(0,3);

  // 🔥 TOP UI
  let topHTML = "<b>🔥 SEGNALI ATTIVI</b><br><br>";

  if (top.length === 0) {
    topHTML += "❌ Nessuna giocata valida";
  } else {
    top.forEach(t => {
      topHTML += `${t.ruota} → ${t.ambo?.[0]} - ${t.ambo?.[1]}<br>`;
    });
  }

  document.getElementById("top").innerHTML = topHTML;

  // 🔥 CARDS SOLO FORTI
  let html = "";

  if (forti.length === 0) {
    html = `<div class="empty">⚠️ Nessun ambo forte oggi</div>`;
  } else {

    forti.forEach(r => {

      html += `
        <div class="card">
          <div class="title">${r.ruota}</div>

          <div class="label">Ultima estrazione</div>
          <div class="value">${r.ultima.join(" - ")}</div>

          <div class="label">Numeri caldi</div>
          <div class="value">${r.caldi.join(" - ")}</div>

          <div class="label">Ambo forte</div>
          <div class="value green">${r.ambo.join(" - ")}</div>

          <div class="label">Score</div>
          <div class="value">${r.score.toFixed(2)}</div>
        </div>
      `;
    });

  }

  document.getElementById("cards").innerHTML = html;

})
.catch(err => {
  console.error(err);
  document.getElementById("top").innerHTML = "❌ Errore caricamento dati";
});
</script>

</body>
</html>
