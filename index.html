<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<title>Lotto Evolution PRO MAX</title>

<style>

body{
    font-family: Arial;
    background:#1e1e1e;
    color:white;
    margin:0;
}

header{
    text-align:center;
    padding:30px;
    background:#111;
}

h1{
    margin:0;
}

.container{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#2b2b2b;
    border-radius:10px;
    padding:20px;
}

.card h2{
    margin-top:0;
    color:#ffd700;
}

.sezione{
    margin-top:10px;
}

.numero{
    font-size:18px;
}

</style>
</head>

<body>

<header>
<h1>Lotto Evolution PRO MAX</h1>
</header>

<div class="container" id="ruote"></div>

<script>

fetch("risultati.json")
.then(res => res.json())
.then(data => {

    const container = document.getElementById("ruote")

    data.ruote.forEach(r => {

        const card = document.createElement("div")
        card.className="card"

        card.innerHTML = `
        <h2>${r.ruota}</h2>

        <div class="sezione">
        <b>Ultima estrazione</b><br>
        ${r.ultima.join(" - ")}
        </div>

        <div class="sezione">
        <b>Numeri caldi</b><br>
        ${r.numeri_caldi.join(" - ")}
        </div>

        <div class="sezione">
        <b>Ambo forte</b><br>
        ${r.ambo_forte}
        </div>

        <div class="sezione">
        <b>Ciclometria</b><br>
        ${r.ciclometria.join(" | ")}
        </div>

        <div class="sezione">
        <b>Saturazione</b><br>
        ${r.saturazione}
        </div>
        `

        container.appendChild(card)

    })

})

</script>

</body>
</html>
