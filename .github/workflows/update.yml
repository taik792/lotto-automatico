name: Lotto Evolution Auto Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * 2,4,6'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Clona repository
        uses: actions/checkout@v3

      - name: Installa Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui algoritmo
        run: python app.py

      - name: Commit risultati
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Aggiornamento automatico Lotto Evolution" || echo "Nessuna modifica"
          git push
